name: Mirror to Codeberg

on:
  push:
    branches: [ "**" ]
  create:
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror Repository to Codeberg
        uses: cssnr/mirror-repository-action@v1
        with:
          url: https://codeberg.org/skdishansachin/dotfiles.git
          password: ${{ secrets.CODEBERG_DOTFILE_MIRROR }}
